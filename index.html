<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Barbearia Regys</title>


<style>

body{

margin:0;
font-family:Arial,sans-serif;

background-image:url(
"https://images.unsplash.com/photo-1621605815971-fbc98d665033"
);

background-size:cover;
background-position:center;

color:white;

display:flex;
justify-content:center;

padding:20px;

}


.caixa{

width:380px;

background:rgba(0,0,0,0.85);

padding:25px;

border-radius:20px;

}


h1,h2{

text-align:center;

color:#d4af37;

}


input,select,button{

width:100%;

padding:12px;

margin-top:10px;

border:none;

border-radius:8px;

box-sizing:border-box;

}


button{

background:#d4af37;

font-weight:bold;

cursor:pointer;

}


.agendamento{

background:#333;

padding:15px;

margin-top:15px;

border-radius:10px;

}


</style>

</head>


<body>


<div class="caixa">


<h1>
💈 Barbearia Regys
</h1>


<input 
id="nome"
placeholder="Nome do cliente"
>


<select id="servico">


<option>Cabelo</option>

<option>Barba</option>

<option>Cabelo e barba</option>

<option>Cabelo e sobrancelha</option>

<option>Cabelo e pigmentação</option>

<option>Cabelo, barba e pigmentação</option>


</select>


<input 
id="data"
type="date"
>


<input 
id="hora"
type="time"
>


<button onclick="agendar()">

AGENDAR

</button>


<hr>


<h2>
🔒 Área do barbeiro
</h2>


<input
id="senha"
type="password"
placeholder="Senha do barbeiro"
>


<button onclick="login()">

Entrar

</button>


<div id="sair">

{% if barbeiro %}

<button onclick="logout()">

🚪 Desligar modo barbeiro

</button>

{% endif %}

</div>


<h2>
📋 Agenda
</h2>


<div id="agenda">


{% for a in agenda %}


<div class="agendamento">


👤 <b>{{a.nome}}</b>

<br>

📅 {{a.data[8:10]}}/{{a.data[5:7]}}/{{a.data[0:4]}}

<br>

🕒 {{a.hora}}

<br>

✂️ {{a.servico}}

<br>

⏱️ {{a.duracao}} minutos


{% if barbeiro %}


<br><br>


<button onclick="cancelar({{a.id}})">
Cancelar
</button>


<button onclick="editar({{a.id}})">
Editar
</button>


{% endif %}


</div>


{% endfor %}


</div>

<script>


function agendar(){

fetch("/agendar",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

nome:document.getElementById("nome").value,

servico:document.getElementById("servico").value,

data:document.getElementById("data").value,

hora:document.getElementById("hora").value

})

})

.then(r=>r.json())

.then(res=>{

alert(res.mensagem);

location.reload();

});

}




function login(){

fetch("/login",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

senha:document.getElementById("senha").value

})

})

.then(r=>r.json())

.then(res=>{

alert(res.mensagem);

location.reload();

});

}





function logout(){

fetch("/logout",{

method:"POST"

})

.then(r=>r.json())

.then(res=>{

alert(res.mensagem);

location.reload();

});

}





function cancelar(id){


if(confirm("Deseja cancelar este agendamento?")){


fetch("/cancelar/"+id,{

method:"DELETE"

})

.then(r=>r.json())

.then(res=>{

alert(res.mensagem);

location.reload();

});


}

}





function editar(id){


let novoNome = prompt(
"Digite o novo nome:"
);



if(novoNome){


fetch("/editar/"+id,{

method:"PUT",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

nome:novoNome

})

})


.then(r=>r.json())

.then(res=>{

alert(res.mensagem);

location.reload();

});


}


}



</script>


</div>


</body>

</html>
